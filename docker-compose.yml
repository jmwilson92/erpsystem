# ForgeRP self-host stack (PostgreSQL).
#
# Evaluation (demo data + persona switcher):
#   docker compose up -d --build
#   → http://localhost:3000
#
# Production / plant pilot (login required, empty books, HTTPS):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Persistence lives in the bundled Postgres service (forgeerp_pgdata volume);
# uploaded files are stored as data URLs in the database.

services:
  forgerp:
    build: .
    container_name: forgerp
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # App runtime (pooled) + schema push (direct) — same host in Docker.
      DATABASE_URL: "postgresql://forgeerp:${POSTGRES_PASSWORD:-forgeerp}@postgres:5432/forgeerp?schema=public"
      DIRECT_URL: "postgresql://forgeerp:${POSTGRES_PASSWORD:-forgeerp}@postgres:5432/forgeerp?schema=public"
      # Evaluation defaults — docker-compose.prod.yml turns these off
      SEED_ON_FIRST_BOOT: ${SEED_ON_FIRST_BOOT:-1}
      # next start always sets NODE_ENV=production; allow open demo on this stack
      ALLOW_DEMO_IN_PRODUCTION: ${ALLOW_DEMO_IN_PRODUCTION:-1}
      DEMO_MODE: ${DEMO_MODE:-}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      # Live company bank feeds — set these in .env to test Plaid (sandbox
      # works fine on localhost). Blank = file/CSV/OFX import only.
      PLAID_CLIENT_ID: ${PLAID_CLIENT_ID:-}
      PLAID_SECRET: ${PLAID_SECRET:-}
      PLAID_ENV: ${PLAID_ENV:-sandbox}
      # Invite / reset email (optional). Blank = links shown in audit log.
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  postgres:
    image: postgres:16-alpine
    container_name: forgeerp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: forgeerp
      # Override in .env for anything internet-facing.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forgeerp}
      POSTGRES_DB: forgeerp
    ports:
      - "5432:5432"
    volumes:
      - forgeerp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forgeerp -d forgeerp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  forgeerp_pgdata:
