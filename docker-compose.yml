# ForgeRP self-host stack.
#
#   docker compose up -d --build     → app on http://localhost:3000
#
# The default profile runs the app on zero-config SQLite (books live on
# the forgerp-data volume). The optional `postgres` profile keeps the
# production-like Postgres database for teams that want it:
#
#   docker compose --profile postgres up -d
#   (then point DATABASE_URL at postgres and switch the Prisma provider)

services:
  forgerp:
    build: .
    container_name: forgerp
    ports:
      - "3000:3000"
    environment:
      # Books + sandboxes live on the volume below
      DATABASE_URL: "file:/data/forgerp.db"
      # Set to "0" to start with an empty database instead of demo data
      SEED_ON_FIRST_BOOT: "1"
    volumes:
      - forgerp-data:/data
    restart: unless-stopped

  postgres:
    profiles: ["postgres"]
    image: postgres:16-alpine
    container_name: forgeerp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: forgeerp
      POSTGRES_PASSWORD: forgeerp
      POSTGRES_DB: forgeerp
    ports:
      - "5432:5432"
    volumes:
      - forgeerp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forgeerp -d forgeerp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  forgerp-data:
  forgeerp_pgdata:
