# Production overlay — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Login required, no demo seed, no persona switcher.

services:
  forgerp:
    environment:
      DEMO_MODE: "0"
      SEED_ON_FIRST_BOOT: "0"
      # Do not allow open persona switcher on plant deploys
      ALLOW_DEMO_IN_PRODUCTION: "0"
      # Public URL for invite links / QR (override in .env)
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://erp.example.com}
