# Production overlay: real auth + HTTPS via Caddy.
#
#   1. Point your domain's DNS A record at this server.
#   2. echo "DOMAIN=erp.example.com" > .env
#      (optionally add RESEND_API_KEY=... and EMAIL_FROM=erp@example.com
#       for real invite/PO e-mail delivery)
#   3. docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Caddy fetches and renews the TLS certificate automatically. First visit
# shows "claim this instance" — create your admin account there.
services:
  forgerp:
    environment:
      DATABASE_URL: "file:/data/forgerp.db"
      # Login required, no persona switcher
      DEMO_MODE: "0"
      ALLOW_DEMO_IN_PRODUCTION: "0"
      # Clean instance — onboard via Setup Wizard / Data Import.
      # Flip to "1" if beta users should land in the demo dataset.
      SEED_ON_FIRST_BOOT: "0"
      # Public URL for invite links / QR codes
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-https://${DOMAIN:-erp.example.com}}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      EMAIL_FROM: "${EMAIL_FROM:-}"
    ports: !override []

  caddy:
    image: caddy:2-alpine
    container_name: forgerp-caddy
    restart: unless-stopped
    depends_on:
      - forgerp
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: "${DOMAIN:?Set DOMAIN=your.host.name in .env}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  caddy-data:
  caddy-config:
